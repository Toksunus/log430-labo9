name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Start YugabyteDB
        run: |
          docker run -d --name yugabyte -p 5433:5433 \
            yugabytedb/yugabyte:latest \
            bash -c "/home/yugabyte/bin/yugabyted start --daemon=false"
          sleep 100

      - name: Install dependencies
        working-directory: yugabyte-db
        run: pip install -r requirements.txt

      - name: Create .env file
        working-directory: yugabyte-db
        run: |
          echo "DB_HOST=127.0.0.1" > .env
          echo "DB_PORT=5433" >> .env
          echo "DB_NAME=yugabyte" >> .env
          echo "DB_USER=yugabyte" >> .env
          echo "DB_PASSWORD=yugabyte" >> .env

      - name: Initialize database
        run: |
          docker exec yugabyte /home/yugabyte/bin/ysqlsh -h localhost -U yugabyte \
            -f /dev/stdin < yugabyte-db/db-init/init.sql

      - name: Run concurrency tests
        working-directory: yugabyte-db/src
        run: |
          python api.py &
          sleep 5
          python tests/concurrency_test.py --threads 5 --product 3
          python tests/concurrency_test.py --threads 20 --product 3
